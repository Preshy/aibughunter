name: GITHUB_TOKEN Probe
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe GITHUB_TOKEN permissions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          exec 3>&1 1>/tmp/probe_output.txt 2>&1
          echo "=== GITHUB_TOKEN length ==="
          echo $GH_TOKEN | wc -c
          echo "=== My repo permissions ==="
          gh api repos/Preshy/aibughunter --jq '.permissions' 2>&1
          echo "=== Cross-repo: hg-internal-web ==="
          gh api repos/Preshy/hg-internal-web 2>&1; echo "EXIT: $?"
          echo "=== Cross-repo: hg-internal-api ==="
          gh api repos/Preshy/hg-internal-api 2>&1; echo "EXIT: $?"
          echo "=== Gists ==="
          gh api gists --jq 'length' 2>&1; echo "EXIT: $?"
          echo "=== Rate limit ==="
          gh api rate_limit --jq '.resources.core' 2>&1

      - name: Runner environment
        run: env | sort > /tmp/env_output.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: probe-results
          path: |
            /tmp/probe_output.txt
            /tmp/env_output.txt
