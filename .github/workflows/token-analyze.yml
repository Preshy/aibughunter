name: Token Analyze
on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - run: |
          CRED_FILE="/home/runner/actions-runner/cached/2.335.1/.credentials"
          python3 -c "
import sys, json, base64
data = json.load(open('/home/runner/actions-runner/cached/2.335.1/.credentials'))
tok = data['Data']['token']
hdr, pld, sig = tok.split('.')
hdr_pad = hdr + '=' * (4 - len(hdr) % 4)
pld_pad = pld + '=' * (4 - len(pld) % 4)
print('=== HEADER ===')
print(json.dumps(json.loads(base64.urlsafe_b64decode(hdr_pad)), indent=2))
print('=== PAYLOAD ===')
print(json.dumps(json.loads(base64.urlsafe_b64decode(pld_pad)), indent=2))
print('=== SIG (truncated) ===')
print(sig[:50] + '...')
" > /tmp/token_output.txt 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: token-results
          path: /tmp/token_output.txt
