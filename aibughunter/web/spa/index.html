<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bug Hunter - Automated Bug Bounty Hunting</title>
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #121820;
            --bg-card: #161c24;
            --bg-code: #0d1117;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
            --purple: #bc8cff;
            --orange: #f0883e;
            --red: #f85149;
            --yellow: #d29922;
            --border: #30363d;
            --border-light: #21262d;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            --radius: 6px;
            --radius-md: 12px;
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            font-size: 16px;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        
        /* Nav */
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 14, 20, 0.95);
            border-bottom: 1px solid var(--border-light);
            padding: 1rem 2rem;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
        }
        .nav-logo span { background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; list-style: none; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .nav-links a:hover { color: var(--text-primary); }
        .nav-badge { font-size: 0.8rem; color: var(--text-muted); background: var(--bg-secondary); padding: 0.25rem 0.75rem; border-radius: 20px; border: 1px solid var(--border-light); }
        
        /* Hero */
        .hero {
            padding: 10rem 2rem 4rem;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }
        .hero h1 span { background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-subtitle { font-size: 1.25rem; color: var(--text-secondary); max-width: 700px; margin: 0 auto 2.5rem; }
        .hero-actions { display: flex; gap: 1rem; justify-content: center; margin-bottom: 3rem; }
        
        /* Code block */
        .code-block {
            background: var(--bg-code);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            text-align: left;
            max-width: 700px;
            margin: 0 auto 4rem;
        }
        .code-line { margin: 0.25rem 0; color: var(--text-secondary); }
        .code-line .comment { color: var(--text-muted); }
        .code-line .cmd { color: var(--green); }
        .code-line .arg { color: var(--accent); }
        .code-line .url { color: var(--orange); }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            max-width: 900px;
            margin: 0 auto 6rem;
            text-align: center;
        }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
        .stat-label { font-size: 0.875rem; color: var(--text-secondary); }
        
        /* Sections */
        .section { padding: 4rem 2rem; text-align: center; }
        .section-title {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        .section-subtitle { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
        .section-desc { color: var(--text-secondary); font-size: 1.1rem; max-width: 600px; margin: 0 auto 3rem; }
        
        /* Feature cards */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .feature-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            text-align: left;
            transition: all 0.2s;
        }
        .feature-card:hover { border-color: var(--border); transform: translateY(-2px); box-shadow: var(--shadow); }
        .feature-icon { font-size: 2rem; margin-bottom: 1rem; }
        .feature-card h3 { font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .feature-card p { color: var(--text-secondary); font-size: 0.95rem; }
        
        /* How it works */
        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        .step { text-align: left; }
        .step-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: var(--accent);
            color: var(--bg-primary);
            border-radius: 50%;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        .step h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; text-transform: uppercase; }
        .step p { color: var(--text-secondary); font-size: 0.95rem; }
        
        /* Pricing */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        .pricing-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 2rem;
            text-align: left;
            position: relative;
        }
        .pricing-card.popular { border-color: var(--accent); }
        .popular-badge { position: absolute; top: -10px; right: 20px; background: var(--accent); color: var(--bg-primary); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .pricing-card h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        .pricing-price { font-size: 2.5rem; font-weight: 700; margin: 1rem 0 0.5rem; }
        .pricing-price span { font-size: 1rem; color: var(--text-muted); font-weight: 400; }
        .pricing-desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .pricing-features { list-style: none; margin-bottom: 1.5rem; }
        .pricing-features li { padding: 0.35rem 0; color: var(--text-secondary); font-size: 0.9rem; }
        .pricing-features li::before { content: '✓ '; color: var(--green); }
        
        /* CTA */
        .cta {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-light);
            padding: 4rem 2rem;
            text-align: center;
        }
        .cta h2 { font-size: 1.75rem; font-weight: 700; margin-bottom: 1rem; }
        .cta p { color: var(--text-secondary); margin-bottom: 2rem; }
        .cta-actions { display: flex; gap: 1rem; justify-content: center; }
        
        /* Footer */
        .footer {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-top: 1px solid var(--border-light);
        }
        .footer a { color: var(--text-secondary); text-decoration: none; }
        .footer a:hover { color: var(--text-primary); }
        
        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: var(--bg-primary); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: transparent; color: var(--text-primary); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--text-secondary); }
        
        /* Auth */
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 6rem 2rem 2rem; }
        .auth-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 2.5rem; width: 100%; max-width: 400px; }
        .auth-card h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .auth-card .subtitle { color: var(--text-secondary); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
        .auth-footer { text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem; }
        .auth-footer a { color: var(--accent); text-decoration: none; }
        
        /* Dashboard */
        .dashboard { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: var(--bg-secondary); border-right: 1px solid var(--border-light); padding: 1.5rem; position: fixed; height: 100vh; top: 0; }
        .main-content { flex: 1; margin-left: 240px; padding: 6rem 2rem 2rem; }
        .nav-item { display: block; padding: 0.75rem 1rem; color: var(--text-secondary); text-decoration: none; cursor: pointer; border-radius: var(--radius); margin-bottom: 0.25rem; font-size: 0.9rem; }
        .nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
        .nav-item.active { background: rgba(88, 166, 255, 0.1); color: var(--accent); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-light); }
        .header h1 { font-size: 1.5rem; }
        .user-info { display: flex; align-items: center; gap: 1rem; font-size: 0.9rem; }
        .plan-badge { background: var(--bg-card); border: 1px solid var(--border); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-box { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 1.25rem; }
        .stat-box .value { font-size: 2rem; font-weight: 700; }
        .stat-box .label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }
        
        .content-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 1.5rem; margin-bottom: 1.5rem; }
        .content-card .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .content-card h2 { font-size: 1.1rem; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border-light); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 0.75rem; border-bottom: 1px solid var(--border-light); font-size: 0.9rem; }
        tr:hover td { background: var(--bg-secondary); }
        code { font-family: var(--font-mono); background: var(--bg-code); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.85rem; }
        
        .status { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: capitalize; }
        .status-pending { background: rgba(210, 153, 34, 0.1); color: var(--yellow); }
        .status-completed { background: rgba(63, 185, 80, 0.1); color: var(--green); }
        .status-paid { background: rgba(63, 185, 80, 0.1); color: var(--green); }
        .status-unpaid { background: rgba(210, 153, 34, 0.1); color: var(--yellow); }
        .status-queued { background: rgba(88, 166, 255, 0.1); color: var(--accent); }
        
        .alert { padding: 1rem 1.5rem; border-radius: var(--radius); position: fixed; top: 80px; right: 20px; z-index: 200; max-width: 400px; }
        .alert-success { background: rgba(63, 185, 80, 0.1); border: 1px solid var(--green); }
        .alert-error { background: rgba(248, 81, 73, 0.1); border: 1px solid var(--red); }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 14, 20, 0.9); display: none; align-items: center; justify-content: center; z-index: 300; }
        .loading-overlay.active { display: flex; }
        .spinner { border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; width: 32px; height: 32px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero { padding: 8rem 1.5rem 3rem; }
            .hero h1 { font-size: 1.75rem; }
            .hero-actions { flex-direction: column; }
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>
    
    <script>
        const API = window.location.origin;
        function isAuth() { return !!localStorage.getItem('token'); }
        let S = { token: localStorage.getItem('token'), user: JSON.parse(localStorage.getItem('user')||'null'), route: isAuth()?'dashboard':'landing', scans: [], plans: [], pending: null };
        function showLoading(v) { document.getElementById('loading').classList.toggle('active', v); }
        function alert(msg, type='success') { const a=document.createElement('div'); a.className=`alert alert-${type}`; a.textContent=msg; document.body.appendChild(a); setTimeout(()=>a.remove(),4000); }
        function go(r) { S.route=r; render(); }
        
        async function login(e,p) { showLoading(true); try { const r=await fetch(`${API}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})}); if(!r.ok)throw new Error((await r.json()).detail||'Failed'); const d=await r.json(); S.token=d.token; S.user=d.user; localStorage.setItem('token',d.token); localStorage.setItem('user',JSON.stringify(d.user)); go('dashboard'); }catch(err){alert(err.message,'error');}finally{showLoading(false);} }
        async function register(e,p,n) { showLoading(true); try { const r=await fetch(`${API}/api/auth/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p,name:n})}); if(!r.ok)throw new Error((await r.json()).detail||'Failed'); const d=await r.json(); S.token=d.token; S.user=d.user; localStorage.setItem('token',d.token); localStorage.setItem('user',JSON.stringify(d.user)); go('dashboard'); }catch(err){alert(err.message,'error');}finally{showLoading(false);} }
        function logout() { S.token=null; S.user=null; localStorage.removeItem('token'); localStorage.removeItem('user'); go('landing'); }
        
        async function loadScans() { if(!S.token)return; const r=await fetch(`${API}/api/scans`,{headers:{'Authorization':`Bearer ${S.token}`}}); if(r.ok) S.scans=await r.json(); }
        async function loadPlans() { const r=await fetch(`${API}/api/plans`); if(r.ok) S.plans=(await r.json()).plans; }
        async function reqScan(target,type,notes) { showLoading(true); try { const r=await fetch(`${API}/api/scans`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${S.token}`},body:JSON.stringify({target,scan_type:type,notes})}); if(!r.ok)throw new Error((await r.json()).detail||'Failed'); const d=await r.json(); if(d.checkout_url){S.pending=d; go('checkout');}else{alert('Scan queued!'); go('scans');} }catch(err){alert(err.message,'error');}finally{showLoading(false);} }
        async function checkout(id) { showLoading(true); try { const r=await fetch(`${API}/api/payments/checkout?scan_id=${id}`,{headers:{'Authorization':`Bearer ${S.token}`}}); const d=await r.json(); if(r.ok){alert('Payment successful!'); go('scans');}else throw new Error(d.detail||'Failed'); }catch(err){alert(err.message,'error');}finally{showLoading(false);} }
        async function upgrade(plan) { showLoading(true); try { const r=await fetch(`${API}/api/plans/upgrade`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${S.token}`},body:JSON.stringify({plan})}); const d=await r.json(); if(r.ok){alert(`Upgraded to ${d.plan}!`); S.user.plan=d.plan; S.user.scans_limit=d.scans_limit; localStorage.setItem('user',JSON.stringify(S.user)); go('dashboard');}else throw new Error(d.detail||'Failed'); }catch(err){alert(err.message,'error');}finally{showLoading(false);} }
        function dlReport(id) { window.open(`${API}/api/scans/${id}/report?authorization=Bearer ${S.token}`, '_blank'); }
        
        function render() { document.getElementById('app').innerHTML = !isAuth() ? (S.route==='login'?rLogin():S.route==='register'?rReg():rLanding()) : rDash(); attach(); }
        
        function rLanding() { return `
            <nav class="nav"><div class="nav-inner"><a class="nav-logo" href="#">🎯 <span>AI Bug Hunter</span></a><ul class="nav-links"><li><a href="#features">Features</a></li><li><a href="#how">How It Works</a></li><li><a href="#pricing">Pricing</a></li><li><a href="https://github.com/Preshy/aibughunter">GitHub</a></li><li><a href="#" onclick="go('login');return false" class="btn btn-primary" style="padding:0.5rem 1rem;font-size:0.85rem;">Get Started</a></li></ul><span class="nav-badge">Automated Security Testing</span></div></nav>
            
            <section class="hero">
                <h1>Find Bugs.<br><span>Get Paid.</span></h1>
                <p class="hero-subtitle">Automated vulnerability scanning that discovers security flaws, generates professional reports, and helps you earn bug bounties.</p>
                <div class="hero-actions">
                    <a href="#" onclick="go('register');return false" class="btn btn-primary">⚡ Get Started Free</a>
                    <a href="https://github.com/Preshy/aibughunter" class="btn btn-secondary">View on GitHub →</a>
                </div>
                <div class="code-block">
                    <div class="code-line"><span class="comment"># Install and scan in 2 lines</span></div>
                    <div class="code-line"><span class="cmd">pip</span> install aibughunter</div>
                    <div class="code-line"><span class="cmd">aibughunter</span> hunt <span class="url">https://target.com</span></div>
                </div>
                <div class="stats">
                    <div><div class="stat-value">19</div><div class="stat-label">Vulnerabilities Found</div></div>
                    <div><div class="stat-value">12</div><div class="stat-label">High Severity</div></div>
                    <div><div class="stat-value">3</div><div class="stat-label">Sites Scanned</div></div>
                    <div><div class="stat-value">600+</div><div class="stat-label">Kali Tools</div></div>
                </div>
            </section>
            
            <section class="section" id="features">
                <div class="section-title">Features</div>
                <div class="section-subtitle">Everything you need to hunt bugs</div>
                <p class="section-desc">From reconnaissance to report, fully automated.</p>
                <div class="features-grid">
                    <div class="feature-card"><div class="feature-icon">🔍</div><h3>Automated Recon</h3><p>Subdomain enumeration, tech analysis, endpoint discovery powered by AI.</p></div>
                    <div class="feature-card"><div class="feature-icon">🤖</div><h3>AI Analysis</h3><p>Qwen CLI identifies attack vectors and suggests the most profitable vulns to test.</p></div>
                    <div class="feature-card"><div class="feature-icon">🛡️</div><h3>Vuln Scanning</h3><p>Automated XSS, SQLi, SSRF, IDOR, auth bypass testing across web apps and APIs.</p></div>
                    <div class="feature-card"><div class="feature-icon">🐉</div><h3>600+ Kali Tools</h3><p>Direct integration with nmap, sqlmap, Metasploit, and more.</p></div>
                    <div class="feature-card"><div class="feature-icon">📝</div><h3>Pro Reports</h3><p>Beautiful HTML/Markdown reports ready for HackerOne or Bugcrowd submission.</p></div>
                    <div class="feature-card"><div class="feature-icon">🌐</div><h3>Web Dashboard</h3><p>Manage scans, track findings, and monitor your bug hunting progress.</p></div>
                </div>
            </section>
            
            <section class="section" id="how">
                <div class="section-title">How It Works</div>
                <div class="section-subtitle">Up and running in minutes</div>
                <p class="section-desc">Four simple steps from target to payout.</p>
                <div class="steps">
                    <div class="step"><div class="step-num">1</div><h3>Submit Target</h3><p>Enter the URL or domain you want to test through the dashboard or CLI.</p></div>
                    <div class="step"><div class="step-num">2</div><h3>AI Scans</h3><p>Comprehensive reconnaissance and automated vulnerability testing.</p></div>
                    <div class="step"><div class="step-num">3</div><h3>Get Report</h3><p>Professional report with findings, POCs, and remediation advice.</p></div>
                    <div class="step"><div class="step-num">4</div><h3>Submit & Earn</h3><p>Submit to bug bounty programs and get paid for discovered vulnerabilities.</p></div>
                </div>
            </section>
            
            <section class="section" id="pricing">
                <div class="section-title">Pricing</div>
                <div class="section-subtitle">Choose your plan</div>
                <p class="section-desc">Start free, scale as you grow.</p>
                <div class="pricing-grid">
                    <div class="pricing-card"><h3>Free</h3><div class="pricing-price">$0</div><div class="pricing-desc">1 scan included</div><ul class="pricing-features"><li>Basic vulnerability scan</li><li>Up to 25 pages crawled</li><li>Markdown report</li><li>48-hour turnaround</li></ul><a href="#" onclick="go('register');return false" class="btn btn-secondary" style="width:100%;justify-content:center;">Start Free</a></div>
                    <div class="pricing-card popular"><div class="popular-badge">Popular</div><h3>Pro</h3><div class="pricing-price">$49<span>/mo</span></div><div class="pricing-desc">10 scans/month</div><ul class="pricing-features"><li>Full vulnerability scan</li><li>Up to 50 pages crawled</li><li>HTML + Markdown reports</li><li>AI-powered analysis</li><li>24-hour turnaround</li><li>Priority support</li></ul><a href="#" onclick="go('register');return false" class="btn btn-primary" style="width:100%;justify-content:center;">Get Pro</a></div>
                    <div class="pricing-card"><h3>Enterprise</h3><div class="pricing-price">$199<span>/mo</span></div><div class="pricing-desc">Unlimited scans</div><ul class="pricing-features"><li>Everything in Pro</li><li>Kali Linux tools integration</li><li>Exploitation testing</li><li>Custom POC generation</li><li>12-hour turnaround</li><li>Dedicated support</li></ul><a href="#" onclick="go('register');return false" class="btn btn-secondary" style="width:100%;justify-content:center;">Contact Sales</a></div>
                </div>
            </section>
            
            <section class="cta">
                <h2>⚡ READY FOR BUG BOUNTY HUNTING?</h2>
                <p>Automated scanning, AI-powered analysis, and professional reports. Get started in under 2 minutes.</p>
                <div class="cta-actions">
                    <a href="#" onclick="go('register');return false" class="btn btn-primary">⚡ Get Started Free</a>
                    <a href="https://github.com/Preshy/aibughunter" class="btn btn-secondary">Read the Docs →</a>
                </div>
            </section>
            
            <footer class="footer"><p>Built with ⚡ by Preshy · <a href="https://github.com/Preshy/aibughunter">GitHub</a> · <a href="https://aibughunter-marketing.fly.dev">Live Demo</a></p></footer>
        `; }
        
        function rLogin() { return `<nav class="nav"><div class="nav-inner"><a class="nav-logo" href="#" onclick="go('landing');return false">🎯 <span>AI Bug Hunter</span></a></div></nav><div class="auth-container"><div class="auth-card"><h2>Sign In</h2><p class="subtitle">Welcome back</p><form id="lf"><div class="form-group"><label>Email</label><input type="email" id="le" required></div><div class="form-group"><label>Password</label><input type="password" id="lp" required></div><button class="btn btn-primary" style="width:100%;justify-content:center;">Sign In →</button></form><div class="auth-footer">No account? <a href="#" onclick="go('register');return false">Create one</a></div></div></div>`; }
        function rReg() { return `<nav class="nav"><div class="nav-inner"><a class="nav-logo" href="#" onclick="go('landing');return false">🎯 <span>AI Bug Hunter</span></a></div></nav><div class="auth-container"><div class="auth-card"><h2>Create Account</h2><p class="subtitle">Start hunting bugs</p><form id="rf"><div class="form-group"><label>Name</label><input type="text" id="rn"></div><div class="form-group"><label>Email</label><input type="email" id="re" required></div><div class="form-group"><label>Password</label><input type="password" id="rp" required></div><button class="btn btn-primary" style="width:100%;justify-content:center;">Create Account →</button></form><div class="auth-footer">Have an account? <a href="#" onclick="go('login');return false">Sign in</a></div></div></div>`; }
        
        function rDash() { const u=S.user||{}; return `
            <nav class="nav"><div class="nav-inner"><a class="nav-logo" href="#">🎯 <span>AI Bug Hunter</span></a><div style="display:flex;gap:1rem;align-items:center;"><span class="plan-badge">${u.plan||'free'}</span><span style="font-size:0.9rem;color:var(--text-secondary);">${u.email||'User'}</span><button class="btn btn-secondary" onclick="logout()" style="padding:0.4rem 0.8rem;font-size:0.8rem;">Sign Out</button></div></div></nav>
            <div class="dashboard">
                <aside class="sidebar">
                    <div class="nav-item ${S.route==='dashboard'?'active':''}" onclick="go('dashboard')">📊 Dashboard</div>
                    <div class="nav-item ${S.route==='new-scan'?'active':''}" onclick="go('new-scan')">🎯 New Scan</div>
                    <div class="nav-item ${S.route==='scans'?'active':''}" onclick="go('scans')">📋 My Scans</div>
                    <div class="nav-item ${S.route==='billing'?'active':''}" onclick="go('billing')">💳 Billing</div>
                </aside>
                <div class="main-content">
                    <div class="header"><h1>${{dashboard:'Dashboard','new-scan':'New Scan',scans:'My Scans',billing:'Billing',checkout:'Checkout'}[S.route]||'Dashboard'}</h1></div>
                    ${S.route==='dashboard'?rDashC():''}${S.route==='new-scan'?rNewScan():''}${S.route==='scans'?rScans():''}${S.route==='billing'?rBill():''}${S.route==='checkout'?rCheckout():''}
                </div>
            </div>
        `; }
        
        function rDashC() { const u=S.user||{}; const c=S.scans.filter(s=>s.status==='completed').length; return `
            <div class="stats-row">
                <div class="stat-box"><div class="value">${S.scans.length}</div><div class="label">Total Scans</div></div>
                <div class="stat-box"><div class="value">${c}</div><div class="label">Completed</div></div>
                <div class="stat-box"><div class="value">0</div><div class="label">Vulns Found</div></div>
                <div class="stat-box"><div class="value">${u.scans_limit===-1?'∞':(u.scans_limit||1)-(u.scans_used||0)}</div><div class="label">Scans Left</div></div>
            </div>
            <div class="content-card">
                <div class="card-header"><h2>Recent Scans</h2><button class="btn btn-primary" onclick="go('new-scan')" style="padding:0.5rem 1rem;font-size:0.85rem;">+ New Scan</button></div>
                ${S.scans.length===0?`<div class="empty-state"><div class="icon">🎯</div><p>No scans yet. Request your first scan.</p></div>`:`<table><thead><tr><th>Target</th><th>Type</th><th>Status</th><th>Date</th></tr></thead><tbody>${S.scans.slice(0,5).map(s=>`<tr><td><code>${s.target}</code></td><td>${s.scan_type}</td><td><span class="status status-${s.status}">${s.status}</span></td><td>${new Date(s.created_at).toLocaleDateString()}</td></tr>`).join('')}</tbody></table>`}
            </div>
        `; }
        
        function rNewScan() { return `<div class="content-card"><div style="max-width:500px;"><div class="form-group"><label>Target URL</label><input type="url" id="st" placeholder="https://target.com"></div><div class="form-group"><label>Scan Type</label><select id="stype"><option value="quick">Quick ($9.99)</option><option value="standard" selected>Standard ($19.99)</option><option value="aggressive">Aggressive ($49.99)</option></select></div><div class="form-group"><label>Notes</label><textarea id="snotes" rows="3" placeholder="Any specific areas..."></textarea></div><button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="submitScan()">Request Scan →</button></div></div>`; }
        
        function rScans() { return `<div class="content-card">${S.scans.length===0?`<div class="empty-state"><div class="icon">📋</div><p>No scans yet.</p></div>`:`<table><thead><tr><th>Target</th><th>Type</th><th>Status</th><th>Payment</th><th>Date</th><th></th></tr></thead><tbody>${S.scans.map(s=>`<tr><td><code>${s.target}</code></td><td>${s.scan_type}</td><td><span class="status status-${s.status}">${s.status}</span></td><td><span class="status status-${s.payment_status}">${s.payment_status}</span></td><td>${new Date(s.created_at).toLocaleDateString()}</td><td>${s.status==='completed'?`<button class="btn btn-secondary" onclick="dlReport('${s.id}')" style="padding:0.3rem 0.6rem;font-size:0.8rem;">📥 Report</button>`:s.payment_status==='unpaid'?`<button class="btn btn-primary" onclick="checkout('${s.id}')" style="padding:0.3rem 0.6rem;font-size:0.8rem;">💳 Pay</button>`:''}</td></tr>`).join('')}</tbody></table>`}</div>`; }
        
        function rBill() { const pl=S.plans.length?S.plans:[{id:'free',name:'Free',price:0,scans_limit:1,features:['1 free scan']},{id:'pro',name:'Pro',price:49,scans_limit:10,features:['10 scans/month','Full scans','HTML reports'],popular:true},{id:'enterprise',name:'Enterprise',price:199,scans_limit:-1,features:['Unlimited scans','All features','Priority support']}]; return `<div class="pricing-grid">${pl.map(p=>`<div class="pricing-card ${p.popular?'popular':''}">${p.popular?'<div class="popular-badge">Popular</div>':''}<h3>${p.name}</h3><div class="pricing-price">$${p.price}<span>/mo</span></div><div class="pricing-desc">${p.scans_limit===-1?'Unlimited':`${p.scans_limit} scans/month`}</div><ul class="pricing-features">${(p.features||[]).map(f=>`<li>${f}</li>`).join('')}</ul>${p.id!==(S.user?.plan||'free')?`<button class="btn ${p.popular?'btn-primary':'btn-secondary'}" style="width:100%;justify-content:center;" onclick="upgrade('${p.id}')">Upgrade</button>`:'<button class="btn btn-secondary" style="width:100%;justify-content:center;" disabled>Current</button>'}</div>`).join('')}</div>`; }
        
        function rCheckout() { const s=S.pending; if(!s)return'<div class="content-card"><p>No pending scan</p></div>'; return `<div class="content-card" style="max-width:400px;"><h2 style="margin-bottom:1rem;">💳 Checkout</h2><div style="background:var(--bg-primary);padding:1rem;border-radius:var(--radius);margin-bottom:1rem;"><div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;"><span style="color:var(--text-muted);">Type</span><span>Standard Scan</span></div><div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.25rem;"><span>Total</span><span>$${s.amount?.toFixed(2)||'19.99'}</span></div></div><button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="checkout('${s.scan_id}')">Pay →</button><p style="text-align:center;margin-top:1rem;font-size:0.8rem;color:var(--text-muted);">Demo mode — no actual charge</p></div>`; }
        
        function submitScan() { const t=document.getElementById('st')?.value; const tp=document.getElementById('stype')?.value||'standard'; const n=document.getElementById('snotes')?.value; if(!t){alert('Enter target','error');return;} reqScan(t,tp,n); }
        function selectType(t) {}
        
        function attach() { const lf=document.getElementById('lf'); if(lf)lf.onsubmit=e=>{e.preventDefault();login(document.getElementById('le').value,document.getElementById('lp').value);}; const rf=document.getElementById('rf'); if(rf)rf.onsubmit=e=>{e.preventDefault();register(document.getElementById('re').value,document.getElementById('rp').value,document.getElementById('rn').value);}; }
        
        async function init() { if(isAuth()) await Promise.all([loadScans(), loadPlans()]); render(); }
        init();
    </script>
</body>
</html>
