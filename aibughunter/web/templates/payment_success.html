<!DOCTYPE html>
<html>
<head>
    <title>Payment Successful - AI Bug Hunter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #020617; color: #f8fafc; }
        .container { max-width: 600px; margin: 0 auto; padding: 4rem 2rem; text-align: center; }
        .success-icon { font-size: 5rem; margin-bottom: 2rem; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #10b981; }
        .info { background: #1e293b; padding: 1.5rem; border-radius: 12px; margin: 2rem 0; text-align: left; }
        .info-item { margin-bottom: 1rem; }
        .info-item strong { color: #94a3b8; }
        .btn { display: inline-block; padding: 1rem 2rem; background: linear-gradient(135deg, #6366f1, #ec4899); border: none; border-radius: 8px; color: white; font-size: 1.1rem; font-weight: 600; cursor: pointer; text-decoration: none; margin: 0.5rem; }
    </div>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Payment Successful!</h1>
        <p style="color: #94a3b8; font-size: 1.25rem; margin-bottom: 2rem;">
            Your scan has been queued and will be completed shortly
        </p>
        
        <div class="info">
            <div class="info-item">
                <strong>Scan ID:</strong> {{ scan.id }}
            </div>
            <div class="info-item">
                <strong>Target:</strong> {{ scan.target }}
            </div>
            <div class="info-item">
                <strong>Status:</strong> Queued for scanning
            </div>
            <div class="info-item">
                <strong>Estimated Completion:</strong> 24-48 hours
            </div>
        </div>
        
        <p style="color: #94a3b8; margin-bottom: 2rem;">
            We'll email you at <strong>{{ scan.email }}</strong> when your report is ready
        </p>
        
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
