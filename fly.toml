# Fly.io configuration for AI Bug Hunter Marketing Site
# Deploy with: fly deploy

app = "aibughunter-marketing"
primary_region = "sjc"  # San Jose (close to US West Coast)

[build]
  dockerfile = "Dockerfile.marketing"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
